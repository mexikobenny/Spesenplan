<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Spesenplan">
<title>Spesenplan</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<style>
:root {
  --bg:#F7F6F3;--surface:#FFFFFF;--border:#E8E6E1;--border2:#D4D1CB;
  --text:#1A1917;--muted:#6B6860;--hint:#A09E99;
  --accent:#2D6A4F;--accent-l:#E8F4EE;--accent-t:#1B4332;
  --red:#C0392B;--red-l:#FDF0EE;
  --blue:#2D5FA4;--blue-l:#EBF2FA;
  --orange:#B7621A;--orange-l:#FDF3E3;
  --radius:12px;--radius-s:8px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1C1C1A;--border:#2A2A27;--border2:#3A3A36;
  --text:#F0EEE9;--muted:#8A8880;--hint:#5A5955;
  --accent:#52B788;--accent-l:#1A3328;--accent-t:#A7F3D0;
  --red:#E57373;--red-l:#2C1A1A;
  --blue:#5B9BD5;--blue-l:#1A2535;
  --orange:#E59B4A;--orange-l:#2C1F0A;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;min-height:100vh;padding-bottom:80px}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px 10px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.app-title{font-size:20px;font-weight:700;letter-spacing:-0.5px;flex-shrink:0}
.project-switcher select{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-s);padding:5px 10px;font-size:12px;font-weight:600;color:var(--muted);font-family:inherit;cursor:pointer;max-width:160px;-webkit-appearance:none;outline:none}
.project-switcher select:focus{border-color:var(--accent)}

.top-nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:57px;z-index:99}
.top-nav::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:10px 18px;font-size:14px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:color 0.15s}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

.sync-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--hint);padding:5px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--hint);flex-shrink:0}
.sync-dot.syncing{background:#B7621A;animation:pulse 1s infinite}
.sync-dot.synced{background:var(--accent)}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.page{display:none;padding:20px}
.page.active{display:block}

.metrics-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:20px}
@media(min-width:380px){.metrics-row.five{grid-template-columns:repeat(3,minmax(0,1fr))}}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-s);padding:12px 14px;box-shadow:var(--shadow)}
.metric-label{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:0.3px}
.metric-value{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.metric-value.green{color:var(--accent)}
.metric-value.red{color:var(--red)}
.metric-value.orange{color:var(--orange)}
.metric-value.blue{color:var(--blue)}

.current-project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
.cpj-name{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.cpj-meta{font-size:12px;color:var(--muted);margin-top:2px;margin-bottom:12px}

.section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:12px}

.projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(152px,1fr));gap:10px;margin-bottom:20px}
.project-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);cursor:pointer;transition:border-color 0.15s}
.project-tile.is-active{border-color:var(--accent)}
.project-tile:active{opacity:0.85}
.pt-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-meta{font-size:10px;color:var(--hint);margin-top:1px;margin-bottom:8px}
.pt-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-top:4px}
.pt-label{color:var(--muted)}
.pt-val{font-weight:600}

.list-toggle{display:flex;background:var(--border);border-radius:var(--radius-s);padding:3px;margin-bottom:16px}
.list-toggle-btn{flex:1;height:34px;border-radius:6px;border:none;background:transparent;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;font-family:inherit;transition:background 0.15s}
.list-toggle-btn.active{background:var(--surface);color:var(--text);font-weight:600;box-shadow:var(--shadow)}
.list-item{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:var(--shadow)}
.list-item:active{border-color:var(--border2)}
.list-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-meta{font-size:11px;color:var(--hint);margin-top:2px}
.li-amount{font-size:15px;font-weight:600;flex-shrink:0}
.li-sub{font-size:11px;color:var(--muted);text-align:right;margin-top:1px}

.day-group{margin-bottom:16px}
.day-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.day-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.day-sum{font-size:11px;color:var(--muted)}

.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.pc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pc-name{font-size:16px;font-weight:700}
.pc-loc{font-size:12px;color:var(--muted);margin-top:2px}
.pc-dates{font-size:11px;color:var(--hint);text-align:right;flex-shrink:0;margin-left:8px}
.pc-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.pc-metric{background:var(--bg);border-radius:var(--radius-s);padding:8px;text-align:center}
.pc-metric-lbl{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:0.3px}
.pc-metric-val{font-size:13px;font-weight:700;margin-top:2px}
.pc-actions{display:flex;gap:8px}
.pc-btn{flex:1;height:34px;border-radius:var(--radius-s);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--border2);background:transparent;color:var(--text)}
.pc-btn.primary{background:var(--accent-l);color:var(--accent-t);border-color:var(--accent)}
.pc-btn.danger{background:var(--red-l);color:var(--red);border-color:var(--red)}

.form-section{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-s);padding:12px 14px}
.form-section-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px}
.perdiem-preview{background:var(--accent-l);border:1px solid var(--accent);border-radius:var(--radius-s);padding:12px}
.pdp-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.pdp-row.total{font-weight:700;font-size:14px;border-top:1px solid rgba(45,106,79,0.2);padding-top:8px;margin-top:4px}
.pdp-label{color:var(--accent-t)}
.pdp-value{font-weight:600;color:var(--accent-t)}
.pdp-value.red{color:var(--red)}

.week-input-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-s);padding:10px 12px;margin-bottom:8px}
.wib-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wib-title{font-size:12px;font-weight:600;color:var(--muted)}
.wib-remove{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;padding:0}

.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:28px;background:var(--accent);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(45,106,79,0.35);display:flex;align-items:center;justify-content:center;z-index:200;transition:transform 0.15s}
.fab:active{transform:scale(0.94)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);z-index:400;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);max-height:92vh;overflow-y:auto}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.sheet-title{font-size:17px;font-weight:700}
.sheet-close{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.form-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.form-row{display:flex;gap:10px}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1}
.form-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px}
.form-input{height:46px;border:1px solid var(--border2);border-radius:var(--radius-s);background:var(--bg);color:var(--text);font-size:16px;padding:0 12px;outline:none;width:100%;font-family:inherit;-webkit-appearance:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--accent)}
.form-select{height:46px;border:1px solid var(--border2);border-radius:var(--radius-s);background:var(--bg);color:var(--text);font-size:15px;padding:0 12px;outline:none;width:100%;font-family:inherit;-webkit-appearance:none;cursor:pointer}
.form-select:focus{border-color:var(--accent)}
.form-input.small{height:40px;font-size:14px}
.btn-submit{height:52px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-submit:active{opacity:0.85}
.btn-add-week{height:38px;background:transparent;border:1px dashed var(--border2);border-radius:var(--radius-s);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;width:100%}
.btn-delete{width:100%;height:46px;background:var(--red-l);color:var(--red);border:1px solid var(--red);border-radius:var(--radius-s);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

.confirm-box{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity 0.2s}
.confirm-box.open{opacity:1;pointer-events:all}
.confirm-card{background:var(--surface);border-radius:var(--radius);padding:24px 20px 20px;width:100%;max-width:320px;text-align:center}
.confirm-title{font-size:17px;font-weight:700;margin-bottom:8px}
.confirm-sub{font-size:14px;color:var(--muted);margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.confirm-btn{flex:1;height:46px;border-radius:var(--radius-s);font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.confirm-cancel{background:var(--bg);color:var(--text);border:1px solid var(--border2)}
.confirm-ok{background:var(--red);color:#fff}

.login-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;width:100%;max-width:360px;box-shadow:var(--shadow)}
.login-title{font-size:24px;font-weight:700;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:24px}
.login-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.login-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px}
.login-input{height:46px;border:1px solid var(--border2);border-radius:var(--radius-s);background:var(--bg);color:var(--text);font-size:16px;padding:0 14px;outline:none;width:100%;font-family:inherit}
.login-input:focus{border-color:var(--accent)}
.login-btn{height:52px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;margin-top:8px}
.login-error{font-size:13px;color:var(--red);margin-top:8px;text-align:center;min-height:18px}
.logout-btn{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--surface);padding:10px 18px;border-radius:20px;font-size:14px;font-weight:500;z-index:600;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty-state{text-align:center;padding:48px 20px}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--hint)}

/* ── Dashboard redesign ────────────────────────────────────────── */
.dash-proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:flex-start}
.dash-proj-left{flex:1;min-width:0}
.dash-proj-name{font-size:19px;font-weight:700;letter-spacing:-0.4px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-proj-sub{font-size:12px;color:var(--muted);margin-top:1px}
.status-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:4px 10px;border-radius:20px;flex-shrink:0;margin-left:10px;margin-top:2px}
.status-badge.aktiv{background:var(--accent-l);color:var(--accent-t)}
.status-badge.abgeschlossen{background:var(--border);color:var(--muted)}
.status-badge.bevorstehend{background:var(--blue-l);color:var(--blue)}

.spesen-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.spesen-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-s);padding:10px 12px;box-shadow:var(--shadow)}
.spesen-lbl{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:3px}
.spesen-val{font-size:15px;font-weight:700;letter-spacing:-0.3px}
.spesen-val.blue{color:var(--blue)}.spesen-val.green{color:var(--accent)}.spesen-val.orange{color:var(--orange)}

.aus-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;-webkit-tap-highlight-color:transparent}
.aus-card:active{opacity:0.85}
.aus-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.aus-lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px}
.aus-right{text-align:right}
.aus-val{font-size:17px;font-weight:700}
.aus-pct{font-size:11px;color:var(--hint);margin-top:1px}
.aus-track{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.aus-fill{height:100%;border-radius:4px;transition:width 0.4s}
.aus-fill.green{background:var(--accent)}
.aus-fill.orange{background:var(--orange)}
.aus-fill.red{background:var(--red)}

.diff-card{border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.diff-card.pos{background:var(--accent-l);border:1px solid var(--accent)}
.diff-card.neg{background:var(--red-l);border:1px solid var(--red)}
.diff-lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.diff-lbl.pos{color:var(--accent-t)}
.diff-lbl.neg{color:var(--red)}
.diff-val{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.diff-val.pos{color:var(--accent-t)}
.diff-val.neg{color:var(--red)}

.insights-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-s);padding:12px 14px;box-shadow:var(--shadow)}
.insight-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px}
.insight-val{font-size:18px;font-weight:700;letter-spacing:-0.4px}
.insight-sub{font-size:11px;color:var(--hint);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Liste filter bar ───────────────────────────────────────────── */
.filter-bar{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:12px;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;height:30px;padding:0 12px;border-radius:15px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit}
.filter-chip.active{background:var(--accent-l);border-color:var(--accent);color:var(--accent-t);font-weight:600}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <span class="app-title">Spesenplan</span>
    <div class="project-switcher">
      <select id="projectSelect" onchange="selectProject(this.value)">
        <option value="">Kein Projekt</option>
      </select>
    </div>
  </div>
</header>

<nav class="top-nav">
  <button class="nav-tab active" data-page="dashboard">Dashboard</button>
  <button class="nav-tab" data-page="liste">Liste</button>
  <button class="nav-tab" data-page="projekte">Projekte</button>
</nav>

<div class="sync-bar">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncText">Verbinde...</span>
  <button class="logout-btn" onclick="doLogout()" style="margin-left:auto">Abmelden</button>
</div>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div id="dashContent"></div>
</div>

<!-- LISTE -->
<div class="page" id="page-liste">
  <div class="list-toggle">
    <button class="list-toggle-btn active" id="toggleIncome" onclick="setListTab('income')">Einnahmen</button>
    <button class="list-toggle-btn" id="toggleExpense" onclick="setListTab('expense')">Ausgaben</button>
  </div>
  <div class="filter-bar" id="projectFilterBar"></div>
  <div id="listeContainer"></div>
</div>

<!-- PROJEKTE -->
<div class="page" id="page-projekte">
  <div id="projekteContainer"></div>
</div>

<!-- SHEET: Projekt (simpel) -->
<div class="sheet" id="projectSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title" id="projectSheetTitle">Neues Projekt</span>
    <button class="sheet-close" onclick="closeSheets()">&#x2715;</button>
  </div>
  <div class="form-body">
    <input type="hidden" id="fTripId">
    <div class="form-group">
      <label class="form-label">Projektname</label>
      <input class="form-input" type="text" id="fTripName" placeholder="z.B. Amsterdam Q1 2026">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Stadt</label>
        <input class="form-input" type="text" id="fCity" placeholder="Amsterdam">
      </div>
      <div class="form-group">
        <label class="form-label">Land</label>
        <input class="form-input" type="text" id="fCountry" placeholder="Niederlande">
      </div>
    </div>
    <div class="form-row">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy }
  from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAJv4fpNnsmJbgCzkN_8hoMj_fmyI6xc6E",
  authDomain:        "spesenplan.firebaseapp.com",
  projectId:         "spesenplan",
  storageBucket:     "spesenplan.firebasestorage.app",
  messagingSenderId: "626276550441",
  appId:             "1:626276550441:web:85d45888710124cc8f1938"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

const tripsCol    = collection(db, "trips");
const incomesCol  = collection(db, "incomes");
const expensesCol = collection(db, "expenses");

// ─── State ───────────────────────────────────────────────────────────────────
let trips = [], incomes = [], expenses = [];
let listProjectFilter = null;
let selectedTripId = null;
let activePage     = "dashboard";
let activeListTab  = "income";
let deleteTarget   = null;
let incomeWeeks    = [];   // per diem weeks while income form is open
const today        = new Date();
let snapUnsubs     = [];

// ─── Auth ────────────────────────────────────────────────────────────────────
window.doLogin = async function() {
  const email = document.getElementById("loginEmail").value.trim();
  const pw    = document.getElementById("loginPassword").value;
  const errEl = document.getElementById("loginError");
  errEl.textContent = "";
  if (!email || !pw) { errEl.textContent = "E-Mail und Passwort eingeben."; return; }
  try { await signInWithEmailAndPassword(auth, email, pw); }
  catch(e) { errEl.textContent = "Anmeldung fehlgeschlagen."; }
};
window.doLogout = async function() {
  snapUnsubs.forEach(u => u()); snapUnsubs = [];
  await signOut(auth); showToast("Abgemeldet");
};
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("loginScreen").style.display = "none";
    startListeners();
  } else {
    document.getElementById("loginScreen").style.display = "flex";
    trips = []; incomes = []; expenses = [];
    snapUnsubs.forEach(u => u()); snapUnsubs = [];
  }
});

function startListeners() {
  setSyncStatus("syncing", "Verbinde...");
  snapUnsubs.push(onSnapshot(query(tripsCol, orderBy("startDate","desc")), snap => {
    trips = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    autoSelectTrip(); renderAll();
  }, () => setSyncStatus("error","Verbindungsfehler")));
  snapUnsubs.push(onSnapshot(query(incomesCol, orderBy("date","desc")), snap => {
    incomes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  }, () => {}));
  snapUnsubs.push(onSnapshot(query(expensesCol, orderBy("date","desc")), snap => {
    expenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  }, () => {}));
}

function setSyncStatus(s, t) {
  document.getElementById("syncDot").className = "sync-dot " + s;
  document.getElementById("syncText").textContent = t;
}
function autoSelectTrip() {
  if (!trips.length) { selectedTripId = null; return; }
  if (selectedTripId && trips.find(t => t.id === selectedTripId)) return;
  const todayStr = today.toISOString().slice(0,10);
  const active   = trips.find(t => t.startDate <= todayStr && t.endDate >= todayStr);
  selectedTripId = active ? active.id : trips[0].id;
}

// ─── Per Diem Berechnung ─────────────────────────────────────────────────────
// Identische Logik wie per_diem_calculator_EN.html
function calcPerDiem(params) {
  const arrDays  = params.travelDays || 0;
  const arrRate  = params.travelDayRate || 0;
  let totalBrutto   = arrDays * arrRate;
  let totalFree     = totalBrutto;
  let totalTaxable  = 0;
  (params.weeks || []).forEach(week => {
    const full      = week.fullDays || 0;
    const mealDed   = (week.frueh  || 0) * (params.mealFrueh  || 0)
                    + (week.mittag || 0) * (params.mealMittag || 0)
                    + (week.abend  || 0) * (params.mealAbend  || 0);
    const mealPerDay = full > 0 ? mealDed / full : 0;
    const freeLimit  = params.freeLimit  || 0;
    const fullRate   = params.fullDayRate || 0;
    for (let d = 0; d < full; d++) {
      const rate    = Math.max(0, fullRate - mealPerDay);
      totalBrutto  += rate;
      totalFree    += Math.min(rate, freeLimit);
      totalTaxable += Math.max(0, rate - freeLimit);
    }
  });
  const lst     = params.lst != null ? totalTaxable * (params.lst / 100) : 0;
  const sv      = params.sv  != null ? (totalTaxable - lst) * (params.sv / 100) : 0;
  const steuern = lst + sv;
  return { brutto: totalBrutto, steuern, net: totalBrutto - steuern };
}

// Summiert gespeicherte berechnete Werte aus Einnahmen-Eintraegen
function getIncomeCalc(tripId) {
  const its = tripId ? incomes.filter(i => i.tripId === tripId) : incomes;
  return {
    brutto:  its.reduce((s,i) => s + (i.brutto  || 0), 0),
    steuern: its.reduce((s,i) => s + (i.steuern || 0), 0),
    net:     its.reduce((s,i) => s + (i.net     || 0), 0)
  };
}
function tripExpenses(tripId) {
  return expenses.filter(e => e.tripId === tripId).reduce((s,e) => s + (e.amount||0), 0);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderAll() {
  setSyncStatus("synced","Synchronisiert");
  updateProjectSelect();
  if      (activePage === "dashboard") renderDashboard();
  else if (activePage === "liste")     renderListe();
  else if (activePage === "projekte")  renderProjekte();
}

// Navigate to expense list filtered by current trip
window.goToExpenseList = function(tripId) {
  listProjectFilter = tripId || selectedTripId || null;
  activeListTab = "expense";
  activePage = "liste";
  document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelector("[data-page='liste']").classList.add("active");
  document.getElementById("page-liste").classList.add("active");
  renderListe();
};

function updateProjectSelect() {
  const sel = document.getElementById("projectSelect");
  sel.innerHTML = trips.length
    ? trips.map(t => `<option value="${t.id}"${t.id===selectedTripId?" selected":""}>${escHtml(t.name||t.city||"Projekt")}</option>`).join("")
    : "<option value=''>Kein Projekt</option>";
}

function renderDashboard() {
  const el   = document.getElementById("dashContent");
  const trip = selectedTripId ? trips.find(t => t.id === selectedTripId) : null;

  if (!trip) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">&#128193;</div><div class="empty-title">Noch kein Projekt</div><div class="empty-sub">Lege im Tab Projekte ein erstes Projekt an</div></div>`;
    return;
  }

  const calc      = getIncomeCalc(trip.id);
  const tripExps  = expenses.filter(e => e.tripId === trip.id);
  const aus       = tripExps.reduce((s,e) => s+(e.amount||0), 0);
  const diff      = calc.net - aus;
  const diffPct   = calc.net > 0 ? Math.round(aus / calc.net * 100) : 0;

  // Status
  const todayStr  = today.toISOString().slice(0,10);
  const status    = trip.startDate > todayStr ? "bevorstehend"
                  : trip.endDate   < todayStr ? "abgeschlossen"
                  : "aktiv";

  // Insights
  const maxExp     = tripExps.length ? tripExps.reduce((a,b) => b.amount>a.amount?b:a) : null;
  const uniqueDays = new Set(tripExps.map(e=>e.date)).size;
  const avgDaily   = uniqueDays > 0 ? aus / uniqueDays : 0;
  const netLeft    = Math.max(0, diff);
  const netLeftPct = calc.net > 0 ? Math.round(netLeft / calc.net * 100) : 0;

  // Progress color
  const barColor = diffPct > 100 ? "red" : diffPct > 80 ? "orange" : "green";

  el.innerHTML = `
    <div class="dash-proj-card">
      <div class="dash-proj-left">
        <div class="dash-proj-name">${escHtml(trip.name||trip.city)}</div>
        <div class="dash-proj-sub">${fmtDate(trip.startDate)}–${fmtDate(trip.endDate)}${trip.city ? " · " + escHtml(trip.city) : ""}</div>
      </div>
      <span class="status-badge ${status}">${status}</span>
    </div>

    <div class="spesen-row">
      <div class="spesen-card"><div class="spesen-lbl">Spesen (Brutto)</div><div class="spesen-val blue">${fmtEur(calc.brutto)}</div></div>
      <div class="spesen-card"><div class="spesen-lbl">Steuern</div><div class="spesen-val orange">${fmtEur(calc.steuern)}</div></div>
      <div class="spesen-card"><div class="spesen-lbl">Netto</div><div class="spesen-val green">${fmtEur(calc.net)}</div></div>
    </div>

    <div class="aus-card" onclick="goToExpenseList()">
      <div class="aus-top">
        <span class="aus-lbl">Ausgaben &#8250;</span>
        <div class="aus-right">
          <div class="aus-val ${diffPct>100?"red":""}">${fmtEur(aus)}</div>
          <div class="aus-pct">${diffPct} % von Netto</div>
        </div>
      </div>
      <div class="aus-track"><div class="aus-fill ${barColor}" style="width:${Math.min(diffPct,100)}%"></div></div>
    </div>

    <div class="diff-card ${diff>=0?"pos":"neg"}">
      <span class="diff-lbl ${diff>=0?"pos":"neg"}">Differenz</span>
      <span class="diff-val ${diff>=0?"pos":"neg"}">${diff>=0?"+":"−"}${fmtEur(Math.abs(diff))}</span>
    </div>

    <div class="section-title">Insights</div>
    <div class="insights-grid">
      ${maxExp ? `<div class="insight-card"><div class="insight-lbl">Gr&#246;&#223;te Ausgabe</div><div class="insight-val">${fmtEur(maxExp.amount)}</div><div class="insight-sub">${escHtml(maxExp.name)}</div></div>` : `<div class="insight-card"><div class="insight-lbl">Gr&#246;&#223;te Ausgabe</div><div class="insight-val">&#8211;</div></div>`}
      <div class="insight-card"><div class="insight-lbl">&#216; pro Tag (Ausgaben)</div><div class="insight-val">${fmtEur(avgDaily)}</div><div class="insight-sub">${uniqueDays} Tage mit Ausgaben</div></div>
      <div class="insight-card"><div class="insight-lbl">Anzahl Ausgaben</div><div class="insight-val">${tripExps.length}</div><div class="insight-sub">${trips.length > 1 ? trips.length + " Projekte gesamt" : "1 Projekt"}</div></div>
      <div class="insight-card"><div class="insight-lbl">Netto verbleibend</div><div class="insight-val ${diff>=0?"green":"red"}">${netLeftPct} %</div><div class="insight-sub">${fmtEur(netLeft)} &#252;brig</div></div>
    </div>
  `;
}

function renderListe() {
  document.getElementById("toggleIncome").classList.toggle("active", activeListTab==="income");
  document.getElementById("toggleExpense").classList.toggle("active", activeListTab==="expense");

  // Project filter chips
  const filterBar = document.getElementById("projectFilterBar");
  const relevantTrips = trips.filter(t =>
    (activeListTab==="income"  && incomes.some(i=>i.tripId===t.id)) ||
    (activeListTab==="expense" && expenses.some(e=>e.tripId===t.id))
  );
  if (relevantTrips.length > 1) {
    filterBar.innerHTML =
      `<button class="filter-chip${listProjectFilter===null?" active":""}" onclick="setListProjectFilter(null)">Alle</button>` +
      relevantTrips.map(t =>
        `<button class="filter-chip${listProjectFilter===t.id?" active":""}" onclick="setListProjectFilter('${t.id}')">${escHtml(t.name||t.city)} (${fmtDate(t.startDate)})</button>`
      ).join("");
    filterBar.style.display = "";
  } else { filterBar.style.display = "none"; }

  const container = document.getElementById("listeContainer");

  if (activeListTab === "income") {
    let items = [...incomes];
    if (listProjectFilter) items = items.filter(i=>i.tripId===listProjectFilter);
    if (!items.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">&#128182;</div><div class="empty-title">Keine Spesen erfasst</div><div class="empty-sub">Tippe auf + um Spesen einzutragen</div></div>`;
      return;
    }
    const groups = groupByDate(items);
    container.innerHTML = Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date => {
      const daySum = groups[date].reduce((s,i) => s+(i.brutto||0), 0);
      return `<div class="day-group">
        <div class="day-header"><span class="day-label">${fmtDayLabel(date)}</span><span class="day-sum">${fmtEur(daySum)} brutto</span></div>
        ${groups[date].map(i => {
          const t = trips.find(tr=>tr.id===i.tripId);
          return `<div class="list-item" onclick="openIncomeEdit('${i.id}')">
            <div class="list-icon" style="background:var(--accent-l)">&#128182;</div>
            <div class="li-info">
              <div class="li-name">${escHtml(i.note||"Spesenzahlung")}</div>
              <div class="li-meta">${t ? escHtml(t.name||t.city)+" ("+fmtDate(t.startDate)+")" : "&#8211;"}</div>
            </div>
            <div>
              <div class="li-amount" style="color:var(--accent)">${fmtEur(i.net||0)} netto</div>
              <div class="li-sub">${fmtEur(i.brutto||0)} brutto</div>
            </div>
          </div>`;
        }).join("")}
      </div>`;
    }).join("");
  } else {
    let items = [...expenses];
    if (listProjectFilter) items = items.filter(e=>e.tripId===listProjectFilter);
    if (!items.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">&#129534;</div><div class="empty-title">Keine Ausgaben</div><div class="empty-sub">Tippe auf + um eine Ausgabe zu erfassen</div></div>`;
      return;
    }
    const groups = groupByDate(items);
    container.innerHTML = Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date => {
      const daySum = groups[date].reduce((s,e) => s+(e.amount||0), 0);
      return `<div class="day-group">
        <div class="day-header"><span class="day-label">${fmtDayLabel(date)}</span><span class="day-sum">${fmtEur(daySum)}</span></div>
        ${groups[date].map(e => {
          const t = trips.find(tr=>tr.id===e.tripId);
          return `<div class="list-item" onclick="openExpenseEdit('${e.id}')">
            <div class="list-icon" style="background:var(--red-l)">&#129534;</div>
            <div class="li-info">
              <div class="li-name">${escHtml(e.name||"Ausgabe")}</div>
              <div class="li-meta">${t ? escHtml(t.name||t.city)+" ("+fmtDate(t.startDate)+")" : "&#8211;"}</div>
            </div>
            <div class="li-amount" style="color:var(--red)">${fmtEur(e.amount||0)}</div>
          </div>`;
        }).join("")}
      </div>`;
    }).join("");
  }
}

window.updateIncomePreview = function() {
  const gN = id => parseFloat(document.getElementById(id).value)||0;
  const tmp = {
    travelDays: gN("iTravelDays"), travelDayRate: gN("iTravelDayRate"),
    fullDayRate: gN("iFullDayRate"), freeLimit: gN("iFreeLimit"),
    lst: gN("iLst"), sv: gN("iSv"),
    mealFrueh: gN("iMealFrueh"), mealMittag: gN("iMealMittag"), mealAbend: gN("iMealAbend"),
    weeks: incomeWeeks
  };
  const c  = calcPerDiem(tmp);
  const el = document.getElementById("incomePreview");
  if (c.brutto > 0) {
    el.style.display = "block";
    document.getElementById("iPdpBrutto").textContent  = fmtEur(c.brutto);
    document.getElementById("iPdpSteuern").textContent = fmtEur(c.steuern);
    document.getElementById("iPdpNetto").textContent   = fmtEur(c.net);
  } else { el.style.display = "none"; }
};

window.saveIncome = async function() {
  const id     = document.getElementById("fIncomeId").value;
  const date   = document.getElementById("fIncomeDate").value;
  const note   = document.getElementById("fIncomeNote").value.trim();
  const tripId = document.getElementById("fIncomeTripId").value;
  const mode   = document.getElementById("fIncomeMode").value;
  if (!date) { showToast("Datum eingeben"); return; }

  let data;
  if (mode === "simple") {
    const brutto  = parseFloat(document.getElementById("iSimpleAmount").value);
    if (isNaN(brutto) || brutto <= 0) { showToast("Betrag eingeben"); return; }
    const steuern = parseFloat(document.getElementById("iSimpleTax").value) || 0;
    data = { date, note, tripId, type: "simple", brutto, steuern, net: brutto - steuern, updated_at: new Date().toISOString() };
  } else {
    const gN = eid => { const v=parseFloat(document.getElementById(eid).value); return isNaN(v)?null:v; };
    const params = {
      travelDays: parseFloat(document.getElementById("iTravelDays").value)||0,
      travelDayRate: gN("iTravelDayRate"), fullDayRate: gN("iFullDayRate"),
      freeLimit: gN("iFreeLimit"), lst: gN("iLst"), sv: gN("iSv"),
      mealFrueh: gN("iMealFrueh"), mealMittag: gN("iMealMittag"), mealAbend: gN("iMealAbend"),
      weeks: incomeWeeks.map(w=>({...w}))
    };
    const calc = calcPerDiem(params);
    if (calc.brutto === 0) { showToast("Tagessatz und Tage eingeben"); return; }
    data = { date, note, tripId, type: "perdiem", ...params, brutto: calc.brutto, steuern: calc.steuern, net: calc.net, updated_at: new Date().toISOString() };
  }

  setSyncStatus("syncing","Speichert...");
  try {
    if (id) { await updateDoc(doc(db,"incomes",id), data); }
    else    { data.created_at=new Date().toISOString(); await addDoc(incomesCol, data); }
    closeSheets(); showToast("Spesen gespeichert");
  } catch(e) { setSyncStatus("error","Fehler"); showToast("Fehler beim Speichern"); }
};

// ─── Utilities ────────────────────────────────────────────────────────────────
function fmtEur(n) { return (n||0).toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})+" \u20ac"; }
function fmtCompact(n) {
  const abs=Math.abs(n||0), sign=(n||0)<0?"&#8722;":"";
  if(abs>=1000) return sign+(Math.round(abs/100)/10).toFixed(1).replace(".",",")+"\u00a0k\u00a0\u20ac";
  return sign+Math.round(abs)+"\u00a0\u20ac";
}
function fmtDate(s) { if(!s) return "&#8211;"; return new Date(s+"T12:00:00").toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"2-digit"}); }
function fmtDayLabel(s) {
  const d=new Date(s+"T12:00:00"), base=new Date(today.getFullYear(),today.getMonth(),today.getDate()), day=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=(base-day)/86400000;
  if(diff===0) return "Heute"; if(diff===1) return "Gestern";
  return d.toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"short"});
}
function groupByDate(items) { const g={}; items.forEach(i=>{if(!g[i.date])g[i.date]=[];g[i.date].push(i);}); return g; }
function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escAttr(s) { return escHtml(s).replace(/'/g,"&#39;"); }
function showToast(msg) { const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
document.addEventListener("keydown", e => { if(e.key==="Escape") closeSheets(); if(e.key==="Enter"&&document.getElementById("loginScreen").style.display!=="none") window.doLogin(); });
</script>
