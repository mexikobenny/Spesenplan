const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

const logEl  = document.getElementById("log");
const barEl  = document.getElementById("progressBar");
const doneEl = document.getElementById("doneMsg");

function log(msg) {
  logEl.style.display = "block";
  logEl.textContent += msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

function setProgress(pct) {
  barEl.style.width = pct + "%";
}

window.startImport = async function() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errEl    = document.getElementById("loginError");
  const btn      = document.getElementById("startBtn");
  errEl.textContent = "";
  if (!email || !password) { errEl.textContent = "E-Mail und Passwort eingeben."; return; }

  btn.disabled = true;
  btn.textContent = "Anmelden...";

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    errEl.textContent = "Anmeldung fehlgeschlagen: " + e.message;
    btn.disabled = false; btn.textContent = "Import starten"; return;
  }

  btn.textContent = "Importiere...";
  log("Angemeldet. Starte Import...");

  // 1. Check for duplicate trips
  const existingTrips = {};
  const tripsSnap = await getDocs(collection(db, "trips"));
  tripsSnap.forEach(d => { existingTrips[d.data().name] = d.id; });
  log(`Bestehende Projekte in DB: ${Object.keys(existingTrips).length}`);

  // 2. Create trips
  const tripIdMap = {...existingTrips};
  const tripsCol  = collection(db, "trips");
  let tripsCreated = 0;
  for (const t of TRIPS) {
    if (tripIdMap[t.name]) {
      log(`  SKIP (existiert): ${t.name}`);
    } else {
      const ref = await addDoc(tripsCol, { ...t, created_at: new Date().toISOString() });
      tripIdMap[t.name] = ref.id;
      log(`  + Projekt: ${t.name}`);
      tripsCreated++;
    }
  }
  log(`\nProjekte: ${tripsCreated} neu, ${TRIPS.length - tripsCreated} uebersprungen.`);
  setProgress(10);

  // 3. Check existing expenses (by name+date to avoid duplicates)
  const existingExpSnap = await getDocs(collection(db, "expenses"));
  const existingKeys = new Set();
  existingExpSnap.forEach(d => {
    const e = d.data();
    existingKeys.add(e.name + "|" + e.date);
  });
  log(`Bestehende Ausgaben in DB: ${existingKeys.size}`);

  // 4. Import expenses
  const expCol = collection(db, "expenses");
  let imported = 0, skipped = 0;
  const total = EXPENSES.length;

  for (let i = 0; i < total; i++) {
    const e = EXPENSES[i];
    const tripId = tripIdMap[e.tripName] || "";
    const key    = e.name + "|" + e.date;
    if (existingKeys.has(key)) {
      skipped++; 
    } else {
      await addDoc(expCol, {
        name:       e.name,
        amount:     e.amount,
        date:       e.date,
        note:       e.note || "",
        tripId:     tripId,
        created_at: new Date().toISOString()
      });
      imported++;
      if (imported % 10 === 0) log(`  Importiert: ${imported}/${total - skipped}`);
    }
    setProgress(10 + Math.round((i+1)/total*90));
  }

  log(`\nAusgaben: ${imported} importiert, ${skipped} uebersprungen (Duplikate).`);
  log("\n=== IMPORT ABGESCHLOSSEN ===");
  setProgress(100);
  doneEl.style.display = "block";
  btn.textContent = "Fertig!";
};
</script>
